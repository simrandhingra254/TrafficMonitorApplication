services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowsight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowsight"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Override the connection string for the container network.
      ConnectionStrings__Default: "Host=db;Port=5432;Database=flowsight;Username=postgres;Password=postgres"
      Cors__AllowedOrigins__0: "http://localhost:8081"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pgdata:
